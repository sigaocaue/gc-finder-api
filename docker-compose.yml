services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gc_network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gcfinder
      POSTGRES_PASSWORD: gcfinder
      POSTGRES_DB: gcfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcfinder"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gc_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gc_network

volumes:
  postgres_data:

networks:
  gc_network:
    driver: bridge
