services:
  api:
    build:
      context: .
      args:
        APP_ENV: ${APP_ENV:-development}
        OCR_GROUPS: ${OCR_GROUPS:-ocr-tesseract}
    container_name: gc_finder_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - cache
    networks:
      - gc_network

  db:
    image: postgres:16
    container_name: gc_finder_db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - .persistence/postgres:/var/lib/postgresql/data
    restart: no
    networks:
      - gc_network

  cache:
    image: redis:7
    container_name: gc_finder_cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
    volumes:
      - .persistence/redis:/data
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    restart: no
    networks:
      - gc_network

volumes:
  persistence:

networks:
  gc_network:
    driver: bridge
