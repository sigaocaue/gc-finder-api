app = 'gc-finder-api'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 3

[checks]
  [checks.health]
    type = 'http'
    port = 8000
    path = '/health'
    interval = '30s'
    timeout = '5s'
